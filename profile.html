<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b132b;
    color: white;
  }

  /* ================= NAVBAR ================= */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1c2541;
    padding: 10px;
  }

  .icon-btn {
    background: #5bc0be;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }

  /* ================= PROFILE HEADER (FIXED FACEBOOK STYLE) ================= */
  .profile-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1c2541;
    margin: 10px;
    padding: 10px;
    border-radius: 12px;
  }

  .left-profile {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #5bc0be;
    cursor: pointer;
  }

  .username {
    font-size: 14px;
    font-weight: bold;
    color: #5bc0be;
  }

  /* ================= 3 DOT MENU ================= */
  .dots {
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
  }

  .menu-box {
    position: absolute;
    right: 10px;
    top: 40px;
    background: #1c2541;
    border-radius: 8px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 999;
  }

  .menu-box button {
    background: none;
    border: none;
    color: white;
    padding: 10px;
    font-size: 12px;
    text-align: left;
    cursor: pointer;
  }

  .menu-box button:hover {
    background: #5bc0be;
    color: black;
  }

  /* ================= ICON ROW ================= */
  .icon-row {
    display: flex;
    gap: 10px;
    margin: 10px;
  }

  .icon-box {
    background: #1c2541;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
  }

  /* ================= POST CARD ================= */
  .card {
    background: #1c2541;
    margin: 10px;
    padding: 10px;
    border-radius: 12px;
  }

  #postInput {
    width: 100%;
    min-height: 160px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    resize: none;
    background: #0b132b;
    color: white;
    box-sizing: border-box;
  }

  /* ================= POSTS ================= */
  .post {
    background: #0b132b;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    position: relative;
  }

  .post-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* HIDE OLD INLINE BUTTONS COMPLETELY */
  .post button {
    display: none !important;
  }
  </style>
</head>

<body>

<div class="navbar">
  <button class="icon-btn" onclick="goBackText()">Back</button>
  <h3>Profile</h3>
  <button class="icon-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- PROFILE HEADER -->
<div class="profile-header">

  <div class="left-profile">
    <div class="avatar" onclick="changeAvatar()"></div>
    <div class="username" id="usernameDisplay">Loading...</div>
  </div>

  <!-- RIGHT 3 DOT MENU -->
  <div style="position:relative;">
    <div class="dots" onclick="togglePostMenu()">⋯</div>

    <div class="menu-box" id="postMenu">
      <button onclick="editPost()">Edit</button>
      <button onclick="deletePost()">Delete</button>
    </div>
  </div>

</div>

<!-- FRIEND ICONS -->
<div class="icon-row">
  <div class="icon-box" onclick="openRequests()">👥 Requests</div>
  <div class="icon-box" onclick="openFriends()">👤 Friends</div>
</div>

<!-- POPUPS -->
<div id="requestsPopup" class="card" style="display:none;">
  <h4>Friend Requests</h4>
  <div id="friendRequestsBox"></div>
  <button onclick="closePopup('requestsPopup')">Close</button>
</div>

<div id="friendsPopup" class="card" style="display:none;">
  <h4>Friends</h4>
  <div id="friendsBox"></div>
  <button onclick="closePopup('friendsPopup')">Close</button>
</div>

<!-- CREATE POST -->
<div class="card">
  <h4>Create Post</h4>

  <textarea id="postInput" placeholder="What's on your mind?"></textarea>

  <div style="display:flex;justify-content:flex-end;margin-top:10px;">
    <button onclick="createPost()">Post</button>
  </div>
</div>

<!-- POSTS -->
<div class="card">
  <h4>My Posts</h4>
  <div id="myPosts"></div>
</div>

<script type="module" src="profile.js"></script>

<script>
function goBackText(){
  location.href = "dashboard.html";
}

function togglePostMenu(){
  const m = document.getElementById("postMenu");
  m.style.display = m.style.display === "flex" ? "none" : "flex";
}

function openRequests(){
  document.getElementById("requestsPopup").style.display = "block";
}

function openFriends(){
  document.getElementById("friendsPopup").style.display = "block";
}

function closePopup(id){
  document.getElementById(id).style.display = "none";
}
</script>

</body>
</html>
