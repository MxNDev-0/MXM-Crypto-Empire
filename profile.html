<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <h3 style="margin:auto;">Profile 👤</h3>
</div>

<div class="container">

  <div class="card">
    <h4>Create Post</h4>

    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()" style="width:auto;">Post</button>
    </div>
  </div>

  <div class="card">
    <h4>My Field</h4>
    <div id="myPosts"></div>
  </div>

</div>

<!-- CLEAN SMALL BACK BUTTON (BLOG STYLE) -->
<div style="
  position: fixed;
  bottom: 15px;
  right: 15px;
">
  <button onclick="history.back()" style="
    background: #5bc0be;
    color: #000;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.25);
  ">
    ← Back
  </button>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
