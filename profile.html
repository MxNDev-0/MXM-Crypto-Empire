<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: #fff;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #1c2541;
      position: sticky;
      top: 0;
    }

    .navbar h3 {
      margin: 0;
      font-size: 16px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .container {
      padding: 15px;
      position: relative;
    }

    .dropdown {
      position: absolute;
      top: 45px;
      right: 10px;
      background: #1c2541;
      border-radius: 10px;
      padding: 10px;
      display: none;
      width: 200px;
      z-index: 10;
    }

    .dropdown input {
      margin-bottom: 6px;
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      border: none;
    }

    .dropdown button {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
      font-size: 12px;
    }

    .username-box {
      text-align: center;
      margin: 12px 0;
      font-size: 16px;
      color: #5bc0be;
    }

    #postInput {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      resize: none;
      font-size: 14px;
      background: #0b132b;
      color: white;
      box-shadow: inset 0 0 0 1px #1c2541;
    }

    .card {
      background: #1c2541;
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .post {
      padding: 10px;
      border-radius: 10px;
      background: #0b132b;
      margin-bottom: 10px;
      position: relative;
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #5bc0be;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    .small-nav-btn {
      margin-top: 10px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 8px;
      background: #5bc0be;
      border: none;
    }

    /* FRIEND SYSTEM BOXES */
    .friend-box {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button class="icon-btn" onclick="toggleMenu()">☰</button>
  <h3>Profile 👤</h3>
  <button class="icon-btn" onclick="location.href='dashboard.html'">⬅</button>
</div>

<div class="container">

  <div id="dropdownMenu" class="dropdown">
    <input id="usernameInput" placeholder="New username">
    <button onclick="updateUsername()">Save Username</button>
    <button onclick="resetPassword()">Reset Password</button>
  </div>

  <div class="username-box">
    Username: <span id="usernameDisplay">Loading...</span>
  </div>

  <button class="small-nav-btn" onclick="location.href='dashboard.html'">
    ⬅ Back
  </button>

  <!-- CREATE POST -->
  <div class="card">
    <h4>Create Post</h4>

    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()" style="padding:6px 10px;border-radius:8px;">
        Post
      </button>
    </div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h4>My Posts</h4>
    <div id="myPosts"></div>
  </div>

  <!-- ✅ FRIEND SYSTEM (ADDED HERE CLEANLY) -->
  <div class="card friend-box">
    <h4>👥 Friend Requests</h4>
    <div id="friendRequestsBox"></div>
  </div>

  <div class="card friend-box">
    <h4>👤 Friends</h4>
    <div id="friendsBox"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
