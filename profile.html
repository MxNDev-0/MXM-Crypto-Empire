<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: #fff;
    }

    .container {
      padding: 15px;
      position: relative;
    }

    /* HEADER BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #1c2541;
    }

    .menu-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .back-btn {
      background: transparent;
      border: 1px solid #5bc0be;
      color: #fff;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* DROPDOWN MENU */
    .dropdown {
      position: absolute;
      top: 55px;
      left: 10px;
      background: #1c2541;
      border-radius: 10px;
      padding: 10px;
      display: none;
      width: 200px;
      z-index: 1000;
    }

    .dropdown input {
      margin-bottom: 6px;
      width: 100%;
      padding: 6px;
    }

    .dropdown button {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
    }

    .username-box {
      text-align: center;
      margin: 15px 0;
      font-size: 16px;
      color: #5bc0be;
    }

    /* POSTS */
    .post {
      background: #1c2541;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      position: relative;
    }

    /* 3 DOT MENU */
    .dots {
      position: absolute;
      right: 10px;
      top: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    .post-menu {
      position: absolute;
      right: 10px;
      top: 30px;
      background: #0b132b;
      border: 1px solid #5bc0be;
      border-radius: 8px;
      display: none;
      flex-direction: column;
      z-index: 10;
    }

    .post-menu button {
      background: none;
      border: none;
      color: #fff;
      padding: 8px;
      text-align: left;
      width: 120px;
    }

    .post-menu button:hover {
      background: #1c2541;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #5bc0be;
      color: #000;
      padding: 10px 15px;
      border-radius: 8px;
      display: none;
    }

    textarea {
      width: 100%;
      height: 90px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      resize: none;
    }

  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <h3 style="margin:0;">Profile 👤</h3>

  <button class="back-btn" onclick="location.href='dashboard.html'">⬅</button>
</div>

<div class="container">

  <!-- DROPDOWN -->
  <div id="dropdownMenu" class="dropdown">
    <input id="usernameInput" placeholder="New username">
    <button onclick="updateUsername()">Save Username</button>
    <button onclick="resetPassword()">Reset Password</button>
  </div>

  <!-- USERNAME -->
  <div class="username-box">
    Username: <span id="usernameDisplay">Loading...</span>
  </div>

  <!-- POST BOX -->
  <div class="card">
    <h4>Create Post</h4>
    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()" style="width:auto;">Post</button>
    </div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h4>My Posts</h4>
    <div id="myPosts"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script type="module" src="profile.js"></script>

</body>
</html>
