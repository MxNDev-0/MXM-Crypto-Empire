<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    /* ================= HEADER ================= */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c2541;
      padding: 10px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ================= PROFILE HEADER (FB STYLE) ================= */
    .profile-header {
      background: #1c2541;
      padding: 20px;
      margin: 12px;
      border-radius: 14px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #5bc0be;
      margin: auto;
      cursor: pointer;
      background-size: cover;
      background-position: center;
    }

    .username {
      margin-top: 10px;
      font-size: 18px;
      color: #5bc0be;
      font-weight: bold;
    }

    /* ================= LAYOUT ================= */
    .container {
      padding: 10px;
    }

    .card {
      background: #1c2541;
      padding: 12px;
      border-radius: 12px;
      margin: 10px;
    }

    /* ================= FRIENDS (TOP SECTION) ================= */
    .top-section {
      margin: 10px;
    }

    /* ================= POST BOX ================= */
    #postInput {
      width: 100%;
      min-height: 160px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      resize: none;
      font-size: 14px;
      background: #0b132b;
      color: white;
      box-shadow: inset 0 0 0 1px #1c2541;
    }

    /* ================= POSTS ================= */
    .post {
      background: #0b132b;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      position: relative;
    }

    /* ONLY 3 DOT MENU */
    .dots {
      position: absolute;
      right: 8px;
      top: 8px;
      cursor: pointer;
      font-size: 18px;
    }

    .menu-box {
      position: absolute;
      right: 8px;
      top: 28px;
      background: #1c2541;
      border-radius: 8px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 5;
    }

    .menu-box button {
      background: none;
      border: none;
      color: white;
      padding: 8px;
      text-align: left;
      font-size: 12px;
      cursor: pointer;
    }

    .menu-box button:hover {
      background: #5bc0be;
      color: black;
    }

    /* BACK BUTTON ONLY */
    .back-btn {
      margin: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #5bc0be;
      border: none;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <button class="icon-btn" onclick="location.href='dashboard.html'">⬅</button>
  <h3>Profile</h3>
  <button class="icon-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- PROFILE HEADER -->
<div class="profile-header">
  <div class="avatar" onclick="changeAvatar()"></div>
  <div class="username" id="usernameDisplay">Loading...</div>
</div>

<!-- BACK BUTTON (ONLY ONE) -->
<button class="back-btn" onclick="location.href='dashboard.html'">Back</button>

<div class="container">

  <!-- FRIEND SYSTEM (TOP LIKE FACEBOOK) -->
  <div class="card">
    <h4>👥 Friend Requests</h4>
    <div id="friendRequestsBox"></div>
  </div>

  <div class="card">
    <h4>👤 Friends</h4>
    <div id="friendsBox"></div>
  </div>

  <!-- CREATE POST -->
  <div class="card">
    <h4>Create Post</h4>

    <textarea id="postInput" placeholder="What's on your mind?"></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()">Post</button>
    </div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h4>My Posts</h4>
    <div id="myPosts"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
