<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI SaaS Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0b132b;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    #dashboard {
      display: none;
      margin-top: 20px;
    }

    .premium {
      margin-top: 20px;
      padding: 15px;
      background: #1c2541;
      border-radius: 10px;
    }

    .pay-btn {
      display: inline-block;
      background: green;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      text-decoration: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 AI SaaS Business</h1>
<p>Welcome to your AI-powered crypto platform.</p>

<!-- 🔐 AUTH SECTION -->
<div id="auth">
  <h2>Login / Signup</h2>

  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard">

  <h2>Dashboard</h2>
  <p>You are logged in 👋</p>

  <h3>Crypto Tool</h3>
  <a href="https://ff.io/?ref=s1nep47a" target="_blank">
    FixedFloat Exchange
  </a>

  <!-- 💳 PREMIUM SECTION -->
  <div class="premium" id="premiumBox">
    <h3>💳 Upgrade to Premium</h3>
    <p>Unlock premium tools, AI features, and advanced crypto insights.</p>

    <a href="https://nowpayments.io/payment/?iid=5153003613"
       target="_blank"
       class="pay-btn">
      🚀 Pay with Crypto (USDT BSC)
    </a>
  </div>

</div>

<!-- 🔥 SCRIPTS -->
<script>
function showDashboard() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

function login() {
  // Firebase login goes here
  showDashboard();
}

function signup() {
  // Firebase signup goes here
  showDashboard();
}
</script>

<!-- Firebase / App Scripts -->
<script type="module" src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
