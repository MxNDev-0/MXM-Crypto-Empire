<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Monetization Control Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    /* ================= HEADER ================= */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #1c2541;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #5bc0be;
    }

    /* ✅ PROFILE ICON (CIRCLE STYLE) */
    .profile-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #5bc0be;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    /* ================= MENU ================= */
    #menu {
      display: none;
      background: #1c2541;
      padding: 10px;
    }

    #menu div {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    /* ================= BLOG FEED ================= */
    .feed {
      padding: 15px;
    }

    .post {
      background: #1c2541;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    /* ================= LOGIN POPUP ================= */
    .login-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .center-box {
      background: #1c2541;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      border: none;
      font-weight: bold;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid #5bc0be;
      color: #5bc0be;
    }
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <div class="left">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">MCN Engine</div>
  </div>

  <!-- ✅ PROFILE BUTTON -->
  <div class="profile-btn" onclick="openLogin()">👤</div>
</div>

<!-- ================= MENU ================= -->
<div id="menu">
  <div>Home</div>
  <div>Trending</div>
  <div>Dashboard</div>
  <div>Settings</div>
</div>

<!-- ================= BLOG FEED ================= -->
<div class="feed" id="feed">
  <!-- Posts will appear here -->
  <div class="post">Loading posts...</div>
</div>

<!-- ================= LOGIN POPUP ================= -->
<div class="login-modal" id="loginModal">
  <div class="center-box">
    <h3>Login / Register</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button class="secondary-btn" onclick="login()">Login</button>

    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script type="module">
import { db } from "./firebase.js";
import {
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* MENU */
window.toggleMenu = function(){
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* LOGIN MODAL */
window.openLogin = function(){
  document.getElementById("loginModal").style.display = "flex";
}

window.closeLogin = function(){
  document.getElementById("loginModal").style.display = "none";
}

/* LOAD BLOG POSTS */
async function loadFeed(){
  const box = document.getElementById("feed");
  box.innerHTML = "";

  const snap = await getDocs(query(collection(db, "blogs"), orderBy("time", "desc")));

  snap.forEach(doc => {
    const p = doc.data();

    box.innerHTML += `
      <div class="post">
        <h4>${p.title || "No title"}</h4>
        <p>${p.content?.slice(0,100) || ""}...</p>
      </div>
    `;
  });
}

loadFeed();
</script>

<script type="module" src="app.js"></script>

</body>
</html>
