<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #0b132b;
      color: white;
      margin: 0;
      font-family: Arial;
    }

    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .center-box {
      width: 100%;
      max-width: 380px;
      background: #1c2541;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #5bc0be;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: #5bc0be;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      border: 1px solid #5bc0be;
      color: #5bc0be;
    }

    .info {
      font-size: 13px;
      opacity: 0.8;
      margin: 10px 0;
      line-height: 1.4;
    }

    #message {
      font-size: 12px;
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="login-wrapper">

  <div class="center-box">

    <div class="logo">MCN</div>
    <h2>MCN Engine V15</h2>

    <div class="info">
      💰 Earn from ads & content<br>
      📢 Buy ad space & promote business<br>
      💬 Join community feed system
    </div>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button class="secondary" onclick="login()">Login</button>

    <p id="message"></p>

  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
