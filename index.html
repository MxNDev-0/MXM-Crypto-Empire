<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Monetization Control Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    /* ================= HEADER ================= */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #1c2541;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #5bc0be;
    }

    .profile-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #5bc0be;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    /* ================= MENU ================= */
    #menu {
      display: none;
      background: #1c2541;
      padding: 10px;
    }

    #menu div {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    /* ================= FEATURED ================= */
    .featured {
      padding: 15px;
    }

    /* ================= FEED ================= */
    .feed {
      padding: 15px;
    }

    .post {
      background: #1c2541;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .post:hover {
      transform: scale(1.02);
      transition: 0.2s;
    }

    /* ================= LOGIN ================= */
    .login-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .center-box {
      background: #1c2541;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      border: none;
      font-weight: bold;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid #5bc0be;
      color: #5bc0be;
    }

    /* ================= FOOTER ================= */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #aaa;
      margin-top: 40px;
    }

    .footer a {
      color: #5bc0be;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <div class="left">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">MCN Engine</div>
  </div>

  <div class="profile-btn" onclick="openLogin()">👤</div>
</div>

<!-- ================= MENU ================= -->
<div id="menu">
  <div>Home</div>
  <div>Trending</div>
  <div>Dashboard</div>
  <div>Settings</div>
</div>

<!-- ================= FEATURED ================= -->
<div class="featured" id="featuredPost"></div>

<!-- ================= BLOG FEED ================= -->
<div class="feed" id="feed">
  <div class="post">Loading posts...</div>
</div>

<!-- ================= LOGIN POPUP ================= -->
<div class="login-modal" id="loginModal">
  <div class="center-box">
    <h3>Login / Register</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button class="secondary-btn" onclick="login()">Login</button>

    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- ================= FOOTER (LEGAL RESTORED) ================= -->
<div class="footer">
  <a href="about.html">About</a> |
  <a href="faq.html">FAQ</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="ads.html">Advertising</a>
  <br><br>
  © MCN Engine
</div>

<!-- ================= SCRIPT ================= -->
<script type="module">

/* MENU */
window.toggleMenu = function(){
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* LOGIN */
window.openLogin = function(){
  document.getElementById("loginModal").style.display = "flex";
}

window.closeLogin = function(){
  document.getElementById("loginModal").style.display = "none";
}

/* OPEN POST — FIXED PATH (IMPORTANT) */
window.openPost = function(id){
  window.location.href = "/blog/post.html?id=" + id;
}

/* LOAD POSTS FROM BACKEND */
async function loadFeed(){
  const feed = document.getElementById("feed");
  const featuredBox = document.getElementById("featuredPost");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const posts = await res.json();

    feed.innerHTML = "";

    if (!posts || posts.length === 0) {
      feed.innerHTML = "<div class='post'>No posts found</div>";
      return;
    }

    /* FEATURED */
    const featured = posts[0];

    featuredBox.innerHTML = `
      <div class="post" onclick="openPost('${featured.id}')" style="border:2px solid #5bc0be">
        <h3>🔥 Featured</h3>
        <h4>${featured.title}</h4>
        ${featured.image ? `<img src="${featured.image}" style="width:100%;border-radius:10px;margin-top:10px">` : ""}
      </div>
    `;

    /* FEED */
    posts.forEach(p => {
      feed.innerHTML += `
        <div class="post" onclick="openPost('${p.id}')">
          <h4>${p.title}</h4>
          <p>${(p.content || "").slice(0,100)}...</p>
        </div>
      `;
    });

  } catch (err) {
    feed.innerHTML = "<div class='post'>Failed to load posts</div>";
  }
}

loadFeed();

</script>

</body>
</html>
