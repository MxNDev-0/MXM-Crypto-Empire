<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI SaaS Business</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#0b132b;
  color:white;
  text-align:center;
  padding:20px;
}

.hero {
  max-width:520px;
  margin:auto;
  padding:20px;
  background:#1c2541;
  border-radius:14px;
}

input, button, textarea {
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:none;
}

button { cursor:pointer; }

#dashboard { display:none; }

.card {
  background:#1c2541;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:520px;
}

#adminPanel {
  display:none;
  background:#ff9800;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
<h2>AI SaaS Business</h2>
<p>BETA Platform</p>
</div>

<!-- AUTH -->
<div id="auth">

<h3>Create Account</h3>
<input id="firstName" placeholder="First Name"><br>
<input id="surname" placeholder="Surname"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<input id="confirmPassword" type="password" placeholder="Confirm Password"><br>

<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="loginEmail" placeholder="Email"><br>
<input id="loginPassword" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>
  <a href="#" onclick="resetPassword()">Forgot Password?</a>
</p>

<p id="error" style="color:red;"></p>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard</h2>
<p id="welcome"></p>

<div class="card">
<h3>Fixedfloat Exchange</h3>
<a href="https://ff.io/?ref=s1nep47a" target="_blank">Open Tool</a>
</div>

<div class="card">
<h3>Free Earning Platform</h3>
<a href="#" target="_blank">Start Earning</a>
</div>

<div class="card">
<h3>Contact Admin</h3>
<textarea id="message" placeholder="Write message..."></textarea><br>
<button onclick="sendMessage()">Send</button>
</div>

<div id="adminPanel">
<h3>ADMIN PANEL</h3>
<button onclick="loadMessages()">View Messages</button>
<div id="messages"></div>
</div>

<button onclick="logout()" style="background:red;color:white;">Logout</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
