<!DOCTYPE html>
<html>
<head>
  <title>Admin Control Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
  <h2>👑 Admin Control Panel</h2>

  <h3>💰 Update Wallet Balance</h3>

  <input id="balanceInput" placeholder="Enter new balance">

  <button onclick="updateWallet()">
    Update Wallet
  </button>

  <hr>

  <h3>➕ Add Earnings Entry</h3>

  <input id="source" placeholder="Source (e.g. ForFans)">
  <input id="amount" placeholder="Amount">

  <button onclick="addEarning()">
    Add Earnings
  </button>

  <hr>

  <!-- 🔥 NEW ADD-ON SECTION (SAFE) -->
  <h3>👥 Users Management</h3>
  <div id="usersList" style="margin-bottom:10px;"></div>

  <h3>🚀 Upgrade Requests</h3>
  <div id="upgradeList"></div>

  <h3>💬 Posts Control</h3>
  <button onclick="clearAllPosts()">Clear All Posts</button>
  <div id="postsList"></div>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
