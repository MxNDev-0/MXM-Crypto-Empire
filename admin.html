<!DOCTYPE html>
<html>
<head>
  <title>Admin Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0b132b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .danger {
      background: #ff4d4d !important;
      color: #fff;
    }

    .list-box {
      max-height: 220px;
      overflow-y: auto;
      padding: 5px;
      background: #0b132b;
      border-radius: 8px;
      margin-top: 10px;
    }

    .item {
      padding: 8px;
      margin-bottom: 6px;
      background: #16213e;
      border-radius: 8px;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h3>👑 Admin Control Panel V3</h3>
</div>

<div class="grid">

  <!-- WALLET -->
  <div class="card">
    <h3>💰 Wallet</h3>
    <input id="balanceInput" placeholder="Enter new balance">
    <button onclick="updateWallet()">Update Wallet</button>
  </div>

  <!-- EARNINGS -->
  <div class="card">
    <h3>➕ Earnings</h3>
    <input id="source" placeholder="Source">
    <input id="amount" placeholder="Amount">
    <button onclick="addEarning()">Add Earnings</button>
  </div>

  <!-- USERS -->
  <div class="card">
    <h3>👥 Users</h3>
    <div id="usersList" class="list-box"></div>
  </div>

  <!-- UPGRADES -->
  <div class="card">
    <h3>🚀 Upgrade Requests</h3>
    <div id="upgradeList" class="list-box"></div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h3>💬 Posts Control</h3>
    <button class="danger" onclick="clearAllPosts()">Clear All Posts</button>
    <div id="postsList" class="list-box"></div>
  </div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
