<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Blog Post</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Latest crypto earning guides, referral programs and online income tips.">

  <meta property="og:title" content="MCN Engine Blog">
  <meta property="og:description" content="Earn crypto, discover platforms and grow online income.">
  <meta property="og:type" content="article">
  <meta property="og:image" content="https://via.placeholder.com/600x300">
  <meta property="og:url" content="">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b132b;
      color: #fff;
      line-height: 1.6;
    }

    .header {
      background: #1c2541;
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #5bc0be;
    }

    .container {
      padding: 18px;
      max-width: 750px;
      margin: auto;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #5bc0be;
      margin-bottom: 15px;
    }

    .image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 18px;
    }

    .content p {
      margin-bottom: 16px;
      font-size: 16px;
      opacity: 0.95;
    }

    .content a {
      color: #5bc0be;
      word-break: break-word;
    }

    /* 🔥 FLOATING BACK BUTTON (FIXED POSITION) */
    .back {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #5bc0be;
      color: #000;
      border: none;
      padding: 12px 16px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .loading {
      text-align: center;
      padding: 50px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>MCN ENGINE</h1>
</div>

<div class="container" id="postContainer">
  <div class="loading">Loading post...</div>
</div>

<button class="back" onclick="location.href='index.html'">← Back</button>

<script>

function getPostId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

/* 🔥 CLEAN + SMART FORMATTER */
function formatContent(text) {
  if (!text) return "";

  return text
    .replace(/[\u200B-\u200D\uFEFF]/g, "")
    .replace(/\n{2,}/g, "\n") // remove excessive spacing
    .replace(
      /(https?:\/\/[^\s]+)/g,
      '<a href="$1" target="_blank">$1</a>'
    )
    .split("\n")
    .filter(p => p.trim() !== "")
    .map(p => `<p>${p.trim()}</p>`)
    .join("");
}

async function loadPost() {
  const id = getPostId();

  if (!id) {
    document.getElementById("postContainer").innerHTML = "<p>Invalid post.</p>";
    return;
  }

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    const post = data.find(p => p.id === id);

    if (!post) {
      document.getElementById("postContainer").innerHTML = "<p>Post not found.</p>";
      return;
    }

    document.title = post.title;

    const desc = (post.content || "").substring(0, 150);

    document.querySelector('meta[name="description"]').setAttribute("content", desc);
    document.querySelector('meta[property="og:title"]').setAttribute("content", post.title);
    document.querySelector('meta[property="og:description"]').setAttribute("content", desc);
    document.querySelector('meta[property="og:image"]').setAttribute(
      "content",
      post.image || "https://via.placeholder.com/600x300"
    );
    document.querySelector('meta[property="og:url"]').setAttribute("content", window.location.href);

    document.getElementById("postContainer").innerHTML = `
      <div class="title">${post.title}</div>
      ${post.image ? `<img class="image" src="${post.image}">` : ""}
      <div class="content">${formatContent(post.content)}</div>
    `;

    fetch(`https://mxm-backend.onrender.com/blog/view/${post.id}`, {
      method: "POST"
    });

  } catch (err) {
    document.getElementById("postContainer").innerHTML = "<p>Error loading post.</p>";
  }
}

loadPost();

</script>

</body>
</html>
