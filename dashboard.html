<!DOCTYPE html>
<html>
<head>
  <title>MXM Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>MXM Crypto Empire <span class="beta">BETA</span></h2>

  <div class="nav-links">
    <button onclick="goHome()">Home</button>
    <button onclick="goProfile()">Profile</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- ANALYTICS -->
  <div class="analytics">
    <h3>📊 Analytics</h3>
    <p>Total Posts: <span id="totalPosts">0</span></p>
    <p>Total Clicks: <span id="totalClicks">0</span></p>
    <p>Total Likes: <span id="totalLikes">0</span></p>
    <p>Top Post: <span id="topPost">None</span></p>
  </div>

  <!-- POST BOX -->
  <div class="post-box">
    <textarea id="postText" placeholder="Write post..."></textarea>
    <input id="postLink" placeholder="Link">

    <label>
      <input type="checkbox" id="isPremium">
      Mark as Premium 💎
    </label>

    <button onclick="createPost()">Create Post</button>
  </div>

  <div id="posts"></div>

</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
