<!DOCTYPE html>
<html>
<head>
  <title>MXM Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">MXM Crypto Empire <span class="beta">BETA</span></h2>

  <div class="nav-links">
    <span>Home</span>
    <span>Profile</span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- POST BOX -->
  <div class="post-box">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <input type="text" id="postLink" placeholder="Paste your link">
    <button onclick="createPost()">Post</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;">
    <h3>Admin Panel 👑</h3>
    <p>You are the admin</p>
  </div>

  <!-- FEED -->
  <div id="posts"></div>

</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
