<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .menu {
      z-index: 9999;
      width: 200px;
      background: #1c2541;
      border: 1px solid rgba(91,192,190,0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      border-radius: 12px;
      overflow: hidden;
    }

    .menu button {
      width: 100%;
      text-align: left;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .menu button:hover {
      background: rgba(91,192,190,0.1);
    }

    #chatBox {
      scroll-behavior: smooth;
      max-height: 250px;
      overflow-y: auto;
      padding: 10px;
      background: #0b132b;
      border-radius: 8px;
    }

    .row {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }

    .row input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #1c2541;
      color: white;
    }

    .row button {
      padding: 8px 12px;
      background: #5bc0be;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ================= WALLET MARKET BOX (NEW INJECTION) ================= */
    .market-box {
      margin-top: 8px;
      padding: 10px;
      background: #0b132b;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      border: 1px solid rgba(91,192,190,0.15);
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .price-label {
      color: #5bc0be;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button onclick="toggleMenu()">☰</button>
  <h3>MCN Engine</h3>
  <button onclick="logout()">Logout</button>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goAdSpace()">🚀 Buy Ad Space</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>
  <button onclick="support()">💰 Support</button>
  <button onclick="openDeveloper()">💻 Developer</button>
  <button onclick="goAdmin()">🔐 Admin</button>
</div>

<div class="container">

  <div class="card">
    <h4>🟢 Live Users</h4>
    <div id="onlineUsers"></div>
  </div>

  <!-- ================= WALLET (INJECTED MARKET PRICES ONLY) ================= -->
  <div class="card">
    <h4>💰 Wallet</h4>

    <p>$<span id="walletBalance">0</span></p>
    <p id="walletUpdated">-</p>

    <!-- 🔥 NEW MARKET DATA -->
    <div class="market-box">
      <div class="price-row">
        <span class="price-label">BTC</span>
        <span id="btcPrice">Loading...</span>
      </div>

      <div class="price-row">
        <span class="price-label">ETH</span>
        <span id="ethPrice">Loading...</span>
      </div>

      <div class="price-row">
        <span class="price-label">BNB</span>
        <span id="bnbPrice">Loading...</span>
      </div>

      <div class="price-row">
        <span class="price-label">USDT</span>
        <span>1.00 USD</span>
      </div>

      <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1)">

      <div class="price-row">
        <span class="price-label">NGN (Est.)</span>
        <span id="ngnRate">Loading...</span>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h4>💬 Community Chat</h4>

    <div id="chatBox"></div>

    <div class="row">
      <input id="chatInput" placeholder="Write something...">
      <button onclick="sendMessage()">Post</button>
    </div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
