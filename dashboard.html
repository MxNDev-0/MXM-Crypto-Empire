<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    /* ================= NAVBAR FIXED LAYOUT ================= */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c2541;
      padding: 10px;
      position: relative;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      margin: 0;
      pointer-events: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ================= HAMBURGER MENU ================= */
    .menu {
      z-index: 9999;
      width: 200px;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 10px;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      width: 100%;
      text-align: left;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* ================= NOTIFICATION ================= */
    .notif-wrapper {
      position: relative;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
    }

    .notif-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: red;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 10px;
      display: none;
    }

    .notif-panel {
      position: absolute;
      top: 50px;
      right: 10px;
      width: 280px;
      max-height: 350px;
      overflow-y: auto;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      z-index: 9999;
    }

    /* ================= ADS ================= */
    .ads-container {
      overflow: hidden;
      position: relative;
    }

    .ads-slider {
      display: flex;
      transition: transform 0.5s ease;
    }

    .ad {
      min-width: 100%;
      text-align: center;
      padding: 15px;
      background: #0b132b;
      border-radius: 8px;
      font-size: 13px;
    }

    /* ================= CARDS ================= */
    .container {
      padding: 10px;
    }

    .card {
      background: #1c2541;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    /* ================= DISCOVER ================= */
    #discoverBox .card {
      cursor: pointer;
    }

    #discoverBox img {
      width: 100%;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">

  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <h3 class="nav-title">MCN Engine</h3>

  <div class="nav-right">

    <!-- 🔔 CENTERED FEATURE (FIXED POSITION LOGIC) -->
    <div class="notif-wrapper" onclick="toggleNotif()">
      🔔
      <span id="notifCount" class="notif-badge"></span>
    </div>

    <button onclick="logout()">Logout</button>

  </div>
</div>

<!-- NOTIFICATIONS PANEL -->
<div id="notifPanel" class="notif-panel"></div>

<!-- MENU -->
<div id="menu" class="menu">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goMessages()">💬 Messages</button>
  <button onclick="goAdSpace()">🚀 Ads</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>
  <button onclick="goAdmin()">🔐 Admin</button>
</div>

<!-- ================= MAIN ================= -->
<div class="container">

  <!-- ADS -->
  <div class="card">
    <h4>🔥 Sponsored Ads</h4>

    <div class="ads-container">
      <div class="ads-slider" id="adsSlider">
        <div class="ad">🚀 Promote your project here</div>
        <div class="ad">💰 Buy ad space on MCN Engine</div>
        <div class="ad">📢 Your ad here</div>
      </div>
    </div>
  </div>

  <!-- PRICES -->
  <div class="card">
    <h4>📊 Live Prices</h4>
    <div id="priceBox">Loading...</div>
  </div>

  <!-- DISCOVER FEED -->
  <div class="card">
    <h4>📰 Discover Feed</h4>
    <div id="discoverBox">Loading feed...</div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<!-- DISCOVER SCRIPT (SAFE - NO FIREBASE CONFLICT) -->
<script>
async function loadDiscover() {
  const box = document.getElementById("discoverBox");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    box.innerHTML = "";

    data.forEach(post => {
      box.innerHTML += `
        <div class="card" onclick="openPost('${post.id}')">

          ${post.image ? `<img src="${post.image}">` : ""}

          <div>
            <b style="color:#5bc0be">${post.title}</b>
            <p style="font-size:12px;opacity:0.8;">
              ${(post.content || "").substring(0,120)}...
            </p>
          </div>

        </div>
      `;
    });

  } catch (e) {
    box.innerHTML = "Failed to load feed";
  }
}

function openPost(id) {
  location.href = "post.html?id=" + id;
}

loadDiscover();
</script>

</body>
</html>
